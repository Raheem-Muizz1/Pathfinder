<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>International Exam Registration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fb;
    padding:40px 20px;
}

.container{
    max-width:650px;
    margin:auto;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#0b3d91;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:6px;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

.radio-group{
    display:flex;
    gap:20px;
    margin-top:8px;
}

.radio-group label{
    font-weight:normal;
    margin:0;
}

button{
    width:100%;
    margin-top:30px;
    padding:14px;
    background:#0b3d91;
    color:#fff;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1256c4;
}
</style>
</head>
<body>

<div class="container">

<h1>🌍 International Exam Registration</h1>

<form action="https://formsubmit.co/muizzraheem02@gmail.com" method="POST">
    <input type="hidden" name="_subject" value="New International Exam Registration">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_tamplate" value="table">
    <input type="hidden" name="_next" value="https://Raheem-Muizz1.github.io/Pathfinder/thankyou.html">

<label>Full Name</label>
<input type="text" placeholder="Enter your full name" name="Full Name" required>

<label>Email Address</label>
<input type="email" placeholder="Enter your email address" name="Email" required>

<label>Phone Number</label>
<input type="tel" placeholder="Enter your phone number" name="Number" required>

<label>Exam Type</label>
<select required name="Exam Type">
    <option value="">Select Exam</option>
    <option>IELTS</option>
    <option>SAT</option>
    <option>TOEFL</option>
    <option>GRE</option>
</select>

<label>Have you written this exam before?</label>

<div class="radio-group">
    <label>
        <input type="radio" name="Written Exam Before?" value="Yes" required >
        Yes
    </label>

    <label>
        <input type="radio" name="Written Exam Before?" value="No">
        No
    </label>
</div>

<label>Target Score</label>
<input type="text" placeholder="Example: IELTS 7.0 or SAT 1400" required name="Target Score">

<label>Preferred Mode</label>
<select required name="Preferred Mode">
    <option value="">Select Mode</option>
    <option>Online</option>
    <option>Physical</option>
    <option>One-on-One</option>
</select>

<button type="submit">Register Now</button>

</form>

</div>

</body>
</html>
