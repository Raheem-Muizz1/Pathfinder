<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:600px;
    width:100%;
    background:#fff;
    padding:40px;
    text-align:center;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
}

.icon{
    font-size:70px;
    margin-bottom:20px;
}

h1{
    color:#0b3d91;
    margin-bottom:15px;
}

p{
    color:#555;
    font-size:17px;
    line-height:1.7;
    margin-bottom:30px;
}

a{
    display:inline-block;
    padding:14px 28px;
    background:#0b3d91;
    color:#fff;
    text-decoration:none;
    border-radius:6px;
    font-size:16px;
    transition:.3s;
}

a:hover{
    background:#1256c4;
}
</style>

</head>
<body>

<div class="container">

<div class="icon">✅</div>

<h1>Thank You!</h1>

<p>
Your registration has been submitted successfully.
Our team will review your information and contact you shortly using the phone number or email you provided.
</p>

<a href="index.html">Return to Home</a>

</div>

</body>
</html>
